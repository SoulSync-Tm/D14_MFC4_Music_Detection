services:

  redis:
    image: redis:7-alpine
    container_name: music-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: music-app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/workspace/data
      - .:/workspace

  # One-shot service: register song names in Redis
  # Usage: docker compose run --rm insert
  insert:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/workspace/data
      - .:/workspace
    command: python scripts/insert_songs.py
    profiles:
      - tools

  # One-shot service: compute and store fingerprint hashes
  # Usage: docker compose run --rm fingerprint
  fingerprint:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/workspace/data
      - .:/workspace
    command: python scripts/fingerprint_songs.py
    profiles:
      - tools

  # One-shot service: run evaluation against samples
  # Usage: docker compose run --rm evaluate
  evaluate:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/workspace/data
      - .:/workspace
    command: python scripts/evaluate_system.py
    profiles:
      - tools

volumes:
  redis-data:
